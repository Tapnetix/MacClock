name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MACCLOCK_SKIP_SNAPSHOTS: "1"

jobs:
  release:
    name: Build & publish release
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout (no external action — org policy is local_only)
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          curl -sL "https://github.com/${REPO}/archive/${SHA}.tar.gz" -o /tmp/src.tgz
          tar -xzf /tmp/src.tgz -C "$GITHUB_WORKSPACE" --strip-components=1

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Run tests (gate)
        run: swift test --parallel

      - name: Build .app bundle
        run: ./build-app.sh

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - MacClock.app

      - name: Verify signature
        run: codesign --verify --verbose MacClock.app

      - name: Build .pkg installer
        run: ./build-pkg.sh

      - name: Inspect package
        run: |
          ls -lh MacClock-*.pkg
          shasum -a 256 MacClock-*.pkg
          /usr/sbin/installer -pkginfo -pkg MacClock-*.pkg

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          PKG_FILE=$(ls MacClock-*.pkg | head -1)
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "MacClock $TAG" \
            --generate-notes \
            "$PKG_FILE"
