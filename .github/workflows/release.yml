name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MACCLOCK_SKIP_SNAPSHOTS: "1"

jobs:
  release:
    name: Build & publish release
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout (no external action — org policy is local_only)
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          curl -sL "https://github.com/${REPO}/archive/${SHA}.tar.gz" -o /tmp/src.tgz
          tar -xzf /tmp/src.tgz -C "$GITHUB_WORKSPACE" --strip-components=1

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Run tests (gate)
        run: swift test --parallel

      - name: Build .app bundle
        run: ./build-app.sh

      - name: Ad-hoc sign
        run: codesign --force --deep --sign - MacClock.app

      - name: Verify signature
        run: codesign --verify --verbose MacClock.app

      - name: Build DMG
        run: |
          STAGING=/tmp/macclock-dmg-staging
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R MacClock.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          # Quarantine-bypass install helper + a plain-text walkthrough.
          # Without notarisation (we don't have an Apple Developer ID), users
          # need to strip the quarantine flag before macOS will run the app.
          # The helper does it for them in one double-click.
          cp ".github/dmg/Install MacClock.command" "$STAGING/"
          cp ".github/dmg/READ ME — Install Instructions.txt" "$STAGING/"
          chmod +x "$STAGING/Install MacClock.command"

          hdiutil create -volname "MacClock" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            -fs HFS+ \
            MacClock.dmg

          hdiutil verify MacClock.dmg
          ls -lh MacClock.dmg
          shasum -a 256 MacClock.dmg

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "MacClock $TAG" \
            --generate-notes \
            MacClock.dmg
