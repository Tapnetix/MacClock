name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Snapshot tests assert against PNGs recorded on the developer's machine;
  # font rendering on hosted runners differs slightly so we skip them here
  # and rely on the unit/service/accessibility/interaction tests instead.
  MACCLOCK_SKIP_SNAPSHOTS: "1"

jobs:
  test:
    name: Build & test
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout (no external action — org policy is local_only)
        env:
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          curl -sL "https://github.com/${REPO}/archive/${SHA}.tar.gz" -o /tmp/src.tgz
          tar -xzf /tmp/src.tgz -C "$GITHUB_WORKSPACE" --strip-components=1

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test --parallel

      - name: Build (release)
        run: swift build -c release

      - name: Build .app bundle
        run: ./build-app.sh

      - name: Verify .app structure
        run: |
          test -f MacClock.app/Contents/MacOS/MacClock
          test -f MacClock.app/Contents/Info.plist
          test -d MacClock.app/Contents/Resources
          plutil -p MacClock.app/Contents/Info.plist | grep -E "CFBundleIdentifier|CFBundleShortVersionString"
