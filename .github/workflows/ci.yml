name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & test
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build (debug)
        run: swift build

      - name: Run tests
        run: swift test --parallel

      - name: Build (release)
        run: swift build -c release

      - name: Build .app bundle
        run: ./build-app.sh

      - name: Verify .app structure
        run: |
          test -f MacClock.app/Contents/MacOS/MacClock
          test -f MacClock.app/Contents/Info.plist
          test -d MacClock.app/Contents/Resources
          plutil -p MacClock.app/Contents/Info.plist | grep -E "CFBundleIdentifier|CFBundleShortVersionString"
